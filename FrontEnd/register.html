<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Librario — Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>📚 Librario</h1>
    <p class="subtitle">Create your member account</p>
    <div id="error-msg" class="error-msg"></div>
    <form id="register-form">
      <div style="display:flex;gap:10px">
        <div class="form-group" style="flex:1">
          <label for="reg-firstname">First Name</label>
          <input type="text" id="reg-firstname" placeholder="First name" required autocomplete="off">
        </div>
        <div class="form-group" style="flex:1">
          <label for="reg-lastname">Last Name</label>
          <input type="text" id="reg-lastname" placeholder="Last name" required autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="At least 6 characters" required>
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
  </div>
  <script src="auth.js"></script>
</body>
</html>
