<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Librario — Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <h1>📚 Librario</h1>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="catalog.html">Catalog</a>
      <a href="loans.html">My Loans</a>
      <a href="wishlist.html">Wishlist</a>
      <a href="reservations.html">Reservations</a>
      <a href="fines.html">Fines</a>
      <a href="rooms.html">Rooms</a>
      <a href="events.html" class="active">Events</a>
      <a href="stats.html">Stats</a>
      <a href="account.html">My Account</a>
      <a href="notifications.html" id="notif-bell-link" style="display:inline-flex;align-items:center;gap:5px;color:white;text-decoration:none;font-weight:600;padding:6px 12px;background:rgba(255,255,255,0.15);border-radius:8px;font-size:14px;position:relative" title="Notifications">
        🔔 <span id="notif-count-badge" style="display:none;background:#e74c3c;color:white;border-radius:50%;min-width:18px;height:18px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 4px">0</span>
      </a>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </nav>
  </div>
</header>

<main class="container">
  <h2>Library Events</h2>
  <div id="events-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px"></div>
</main>

<script src="auth.js"></script>
<script>
  var API = 'http://localhost:5273/api';

  async function loadEvents() {
    var events = await fetch(API + '/events').then(r => r.json()).catch(() => []);
    var grid   = document.getElementById('events-grid');

    if (!events.length) {
      grid.innerHTML = '<div style="grid-column:1/-1"><div class="card"><p class="empty">No upcoming events.</p></div></div>';
      return;
    }

    grid.innerHTML = events.map(function(ev) {
      var date      = new Date(ev.eventDate);
      var spotsLeft = ev.capacity - ev.registeredCount;
      var isFull    = spotsLeft <= 0;

      return '<div class="card">' +
        '<div style="background:linear-gradient(135deg,#1a5c42,#2b7a5e);color:white;margin:-20px -20px 16px;padding:16px;border-radius:12px 12px 0 0">' +
          '<div style="font-size:11px;opacity:0.8;margin-bottom:4px">' + date.toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long'}) + ' · ' + date.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}) + '</div>' +
          '<div style="font-size:16px;font-weight:600">' + ev.title + '</div>' +
        '</div>' +
        '<p style="font-size:13px;color:#555;margin-bottom:10px">' + (ev.description || '') + '</p>' +
        (ev.linkedBook ? '<div style="font-size:12px;color:#1a5c42;margin-bottom:8px">📖 ' + ev.linkedBook + '</div>' : '') +
        '<div style="font-size:12px;color:#666;margin-bottom:12px">📍 ' + (ev.location || 'Library') + ' · ' + (isFull ? '<span style="color:#e74c3c">Full</span>' : '<span style="color:#1a5c42">' + spotsLeft + ' spots left</span>') + '</div>' +
        '<button onclick="registerEvent(' + ev.id + ', this)" class="btn btn-green" style="width:100%">' + (isFull ? 'Join Waitlist' : 'Register') + '</button>' +
      '</div>';
    }).join('');
  }

  async function registerEvent(eventId, btn) {
    btn.disabled = true;
    btn.textContent = 'Registering…';
    var res = await fetch(API + '/events/' + eventId + '/register?userId=' + getCurrentUserId(), { method: 'POST' });
    var d   = await res.json();
    if (res.ok) {
      showToast(d.isWaitlisted ? 'Added to waitlist (#' + d.waitlistPos + ')' : 'Registered! Check notifications.', 'success');
      btn.textContent = d.isWaitlisted ? 'On Waitlist' : '✓ Registered';
    } else {
      showToast(d.message || 'Could not register.', 'error');
      btn.disabled = false;
      btn.textContent = 'Register';
    }
  }

  loadEvents();
</script>
<script>
(function(){
  var API = 'http://localhost:5273/api';
  function updateBell() {
    var uid = sessionStorage.getItem('userId');
    if (!uid) return;
    fetch(API + '/notifications/' + uid)
      .then(function(r){return r.json();})
      .then(function(data){
        var unread = data.filter(function(n){return !n.isRead;}).length;
        var badge = document.getElementById('notif-count-badge');
        if (!badge) return;
        if (unread > 0) {
          badge.textContent = unread > 99 ? '99+' : unread;
          badge.style.display = 'inline-flex';
        } else {
          badge.style.display = 'none';
        }
      }).catch(function(){});
  }
  document.addEventListener('DOMContentLoaded', function(){
    updateBell();
    setInterval(updateBell, 30000);
  });
})();
</script>
<script src="notifications-widget.js"></script>
</body>
</html>
