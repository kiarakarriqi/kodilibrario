<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Librario — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a5c42 0%, #2b7a5e 50%, #1a3a5c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 28px 32px 0;
      text-align: center;
    }

    .card-header h1 { font-size: 28px; color: #1a5c42; margin-bottom: 4px; }
    .card-header p  { font-size: 13px; color: #888; margin-bottom: 20px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid #f0f0f0;
      margin: 0 32px;
    }

    .tab {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab:hover { color: #555; }

    .tab.active.admin  { color: #c0392b; border-bottom-color: #c0392b; }
    .tab.active.staff  { color: #d4850a; border-bottom-color: #d4850a; }
    .tab.active.member { color: #1a5c42; border-bottom-color: #1a5c42; }

    .tab-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .admin  .tab-dot { background: #c0392b; }
    .staff  .tab-dot { background: #d4850a; }
    .member .tab-dot { background: #1a5c42; }

    /* ── PANELS ── */
    .panel { display: none; padding: 24px 32px 32px; }
    .panel.active { display: block; }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .badge-admin  { background: #fde8e8; color: #c0392b; }
    .badge-staff  { background: #fef3e2; color: #d4850a; }
    .badge-member { background: #e8f5ee; color: #1a5c42; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; margin-bottom: 6px;
      font-size: 13px; font-weight: 500; color: #444;
    }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none; border-color: #1a5c42;
      box-shadow: 0 0 0 3px rgba(26,92,66,0.08);
    }
    .panel.admin-panel  input:focus { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.08); }
    .panel.staff-panel  input:focus { border-color: #d4850a; box-shadow: 0 0 0 3px rgba(212,133,10,0.08); }

    .btn {
      width: 100%; padding: 13px;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit; margin-top: 4px;
      color: white;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(0); }
    .btn-admin  { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .btn-staff  { background: linear-gradient(135deg, #d4850a, #f39c12); }
    .btn-member { background: linear-gradient(135deg, #1a5c42, #2b7a5e); }

    .error-msg {
      background: #fde8e8; color: #c0392b;
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 14px; font-size: 13px;
      display: none; border-left: 3px solid #c0392b;
    }
    .error-msg.show { display: block; animation: shake 0.3s; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0; color: #bbb; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }

    .register-link {
      text-align: center; font-size: 13px; color: #888; margin-top: 14px;
    }
    .register-link a { color: #1a5c42; font-weight: 600; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }

    .admin-note, .staff-note {
      font-size: 12px; color: #999;
      background: #fafafa; border-radius: 8px;
      padding: 10px 12px; margin-top: 14px;
      border: 1px solid #f0f0f0; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>📚 Librario</h1>
      <p>Library Management System</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab admin active" onclick="switchTab('admin')">
        <span class="tab-dot"></span> Admin
      </div>
      <div class="tab staff" onclick="switchTab('staff')">
        <span class="tab-dot"></span> Staff
      </div>
      <div class="tab member" onclick="switchTab('member')">
        <span class="tab-dot"></span> Member
      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="panel admin-panel active" id="panel-admin">
      <div class="role-badge badge-admin">🔴 Administrator Access</div>
      <div class="error-msg" id="err-admin"></div>
      <form id="form-admin">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="admin-email" placeholder="admin@librario.com" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-password" placeholder="Admin password" required>
        </div>
        <button type="submit" class="btn btn-admin">Login as Administrator</button>
      </form>
      <div class="admin-note">🔐 Admin access is restricted. Contact system owner for credentials.</div>
    </div>

    <!-- STAFF PANEL -->
    <div class="panel staff-panel" id="panel-staff">
      <div class="role-badge badge-staff">🟡 Library Staff Access</div>
      <div class="error-msg" id="err-staff"></div>
      <form id="form-staff">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="staff-email" placeholder="staff@librario.com" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="staff-password" placeholder="Staff password" required>
        </div>
        <button type="submit" class="btn btn-staff">Login as Staff</button>
      </form>
      <div class="staff-note">🔑 Staff accounts are created by the Administrator.</div>
    </div>

    <!-- MEMBER PANEL -->
    <div class="panel member-panel" id="panel-member">
      <div class="role-badge badge-member">🟢 Member Access</div>
      <div class="error-msg" id="err-member"></div>
      <form id="form-member">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="member-email" placeholder="your@email.com" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="member-password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-member">Login as Member</button>
      </form>
      <div class="divider">or</div>
      <div class="register-link">
        New member? <a href="register.html">Create an account →</a>
      </div>
    </div>
  </div>

  <script>
    var API = 'http://localhost:5273/api';

    function switchTab(role) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      document.querySelector('.tab.' + role).classList.add('active');
      document.getElementById('panel-' + role).classList.add('active');
    }

    async function doLogin(email, password, errElId, expectedRole) {
      var errEl = document.getElementById(errElId);
      errEl.classList.remove('show');
      try {
        var res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email: email, password: password })
        });
        if (!res.ok) {
          var d = await res.json();
          errEl.textContent = d.message || 'Invalid credentials!';
          errEl.classList.add('show'); return;
        }
        var user = await res.json();

        // Check if role matches the tab
        if (expectedRole && user.role !== expectedRole) {
          errEl.textContent = 'This account does not have ' + expectedRole + ' access.';
          errEl.classList.add('show'); return;
        }

        sessionStorage.setItem('userId',   String(user.userId));
        sessionStorage.setItem('userName', user.name);
        sessionStorage.setItem('userRole', user.role);

        if (user.role === 'Admin' || user.role === 'Staff') {
          window.location.href = 'staff-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch(err) {
        errEl.textContent = 'Server error. Make sure the API is running!';
        errEl.classList.add('show');
      }
    }

    document.getElementById('form-admin').addEventListener('submit', function(e) {
      e.preventDefault();
      doLogin(
        document.getElementById('admin-email').value.trim(),
        document.getElementById('admin-password').value.trim(),
        'err-admin', 'Admin'
      );
    });

    document.getElementById('form-staff').addEventListener('submit', function(e) {
      e.preventDefault();
      doLogin(
        document.getElementById('staff-email').value.trim(),
        document.getElementById('staff-password').value.trim(),
        'err-staff', 'Staff'
      );
    });

    document.getElementById('form-member').addEventListener('submit', function(e) {
      e.preventDefault();
      doLogin(
        document.getElementById('member-email').value.trim(),
        document.getElementById('member-password').value.trim(),
        'err-member', 'Member'
      );
    });

    // If already logged in, redirect
    var uid = sessionStorage.getItem('userId');
    var role = sessionStorage.getItem('userRole');
    if (uid) {
      if (role === 'Admin' || role === 'Staff') window.location.href = 'staff-dashboard.html';
      else window.location.href = 'index.html';
    }
  </script>
</body>
</html>
